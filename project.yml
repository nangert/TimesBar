name: TimesBar
options:
  bundleIdPrefix: bar.times
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
targets:
  TimesBar:
    type: application
    platform: macOS
    sources:
      - TimesBar
    info:
      path: TimesBar/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: TimesBar
        CFBundleShortVersionString: "0.6.0"
        CFBundleVersion: "6"
    entitlements:
      path: TimesBar/TimesBar.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bar.times.TimesBar
        GENERATE_INFOPLIST_FILE: NO
  TimesBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - TimesBarTests
    dependencies:
      - target: TimesBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bar.times.TimesBarTests
        GENERATE_INFOPLIST_FILE: YES
  timesbar-import:
    type: tool
    platform: macOS
    sources:
      - path: TimesBarImport
      - path: TimesBar/Models
      - path: TimesBar/Networking
      - path: TimesBar/Storage
    settings:
      base:
        PRODUCT_NAME: timesbar-import
        PRODUCT_BUNDLE_IDENTIFIER: bar.times.TimesBarImport
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
schemes:
  TimesBar:
    build:
      targets:
        TimesBar: all
        TimesBarTests: [test]
    test:
      targets:
        - TimesBarTests
    run:
      config: Debug
  timesbar-import:
    build:
      targets:
        timesbar-import: all
    run:
      config: Debug
